<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Press — Esther Wojcicki World Tour</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body { cursor: auto; }
        *, *::before, *::after { cursor: auto; }
        .press-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 120px 60px;
            text-align: center;
        }
        .press-page .section-title { margin-bottom: 24px; }
        .press-body {
            font-size: 18px;
            line-height: 1.7;
            color: var(--color-text-mutated);
            font-weight: 300;
            max-width: 540px;
            margin-bottom: 48px;
        }
        .press-contact {
            color: #E2BA75;
            text-decoration: none;
            font-size: 18px;
            transition: opacity 0.3s ease;
        }
        .press-contact:hover { opacity: 0.7; }
        .back-link {
            position: fixed;
            top: 40px;
            left: 60px;
            color: var(--color-text-main);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }
        .back-link:hover { opacity: 1; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Back</a>

    <div class="press-page">
        <h2 class="tagline">PRESS</h2>
        <h1 class="section-title serif">Press Release</h1>
        <p class="press-body">
            The official press release for the Esther Wojcicki World Tour is coming soon. For press inquiries, interview requests, or media accreditation, please contact us directly.
        </p>
        <a href="mailto:michal.wyrebkowski@thisisit.edu.pl" class="press-contact serif">
            michal.wyrebkowski@thisisit.edu.pl
        </a>
    </div>
</body>
</html>
